name: CI
on: [push, pull_request]
jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd backend && npm ci && node --test
      - run: cd web && npm ci && npm run build
      - run: echo "deploy step placeholder for staging" 
