version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - NODE_ENV=staging
      - JWT_SECRET=staging-secret
    ports:
      - "3000:3000"
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8080:80"
